<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>オランジュリー美術館 — モネの睡蓮</title>
  <style>
    * { margin: 0; padding: 0; }
    body { overflow: hidden; background: #000; font-family: 'Georgia', 'Hiragino Mincho ProN', serif; }
    canvas { display: block; }
    #info {
      position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
      color: rgba(255,255,255,0.7); background: rgba(0,0,0,0.4);
      padding: 8px 20px; border-radius: 20px; font-size: 12px;
      pointer-events: none; z-index: 10;
    }
    #loading {
      position: fixed; top: 0; left: 0; right: 0; bottom: 0;
      background: #f5f0e8; display: flex; align-items: center; justify-content: center;
      flex-direction: column; color: #6b7b5e; font-size: 16px; z-index: 100; letter-spacing: 3px;
    }
    #loading .title { font-size: 24px; color: #4a5a3e; margin-bottom: 8px; }
    #loading .subtitle { font-size: 13px; color: #8a8a7a; margin-bottom: 24px; }
    #loading .spinner {
      width: 30px; height: 30px; border: 2px solid #ccc; border-top-color: #6b7b5e;
      border-radius: 50%; animation: spin 1.5s linear infinite; margin-bottom: 16px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    #controls {
      position: fixed; top: 20px; right: 20px; z-index: 10; display: flex; gap: 8px;
    }
    #controls button {
      background: rgba(0,0,0,0.4); color: rgba(255,255,255,0.8);
      border: 1px solid rgba(255,255,255,0.2); padding: 8px 14px;
      border-radius: 20px; font-size: 12px; cursor: pointer;
      font-family: inherit; transition: all 0.3s; backdrop-filter: blur(4px);
    }
    #controls button:hover { background: rgba(0,0,0,0.6); }
    #controls button.active { background: rgba(107,123,94,0.6); border-color: rgba(107,123,94,0.8); }
    #room-select {
      position: fixed; top: 20px; left: 20px; z-index: 10;
    }
    #room-select button {
      background: rgba(0,0,0,0.4); color: rgba(255,255,255,0.8);
      border: 1px solid rgba(255,255,255,0.2); padding: 8px 14px;
      border-radius: 20px; font-size: 12px; cursor: pointer;
      font-family: inherit; margin-right: 6px; transition: all 0.3s; backdrop-filter: blur(4px);
    }
    #room-select button:hover { background: rgba(0,0,0,0.6); }
    #room-select button.active { background: rgba(107,123,94,0.6); border-color: rgba(107,123,94,0.8); }
  </style>
</head>
<body>
  <div id="loading">
    <div class="title">Musée de l'Orangerie</div>
    <div class="subtitle">Claude Monet — Les Nymphéas</div>
    <div class="spinner"></div>
    <div id="loading-text">睡蓮の間を準備中...</div>
  </div>
  <div id="room-select">
    <button class="active" onclick="switchRoom(1)">第1室</button>
    <button onclick="switchRoom(2)">第2室</button>
  </div>
  <div id="controls">
    <button id="btn-auto" class="active" onclick="toggleAuto()">自動鑑賞</button>
    <button onclick="toggleManual()">手動操作</button>
  </div>
  <div id="info">自動鑑賞中 — スクロールでズーム / クリックで手動に切替</div>

  <script type="importmap">
  {
    "imports": {
      "three": "https://cdn.jsdelivr.net/npm/three@0.162.0/build/three.module.js",
      "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.162.0/examples/jsm/"
    }
  }
  </script>

  <script type="module">
    import * as THREE from 'three';
    import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

    // --- Scene ---
    const scene = new THREE.Scene();
    const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
    camera.position.set(0, 0, 0.01);

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    document.body.appendChild(renderer.domElement);

    // --- Panorama sphere (inside-out) ---
    const sphereGeo = new THREE.SphereGeometry(50, 64, 32);
    sphereGeo.scale(-1, 1, 1); // Flip normals inward
    const textureLoader = new THREE.TextureLoader();
    let sphereMat, sphereMesh;
    let currentRoom = 1;

    function loadRoom(roomNum) {
      currentRoom = roomNum;
      document.getElementById('loading').style.display = 'flex';
      document.getElementById('loading-text').textContent =
        roomNum === 1 ? '第1室の睡蓮を読み込み中...' : '第2室の睡蓮を読み込み中...';

      document.querySelectorAll('#room-select button').forEach((btn, i) => {
        btn.classList.toggle('active', i + 1 === roomNum);
      });

      const url = `panorama_room${roomNum}.jpg?v=${Date.now()}`;
      textureLoader.load(url, (texture) => {
        texture.colorSpace = THREE.SRGBColorSpace;
        if (sphereMesh) {
          sphereMesh.material.map.dispose();
          sphereMesh.material.map = texture;
          sphereMesh.material.needsUpdate = true;
        } else {
          sphereMat = new THREE.MeshBasicMaterial({ map: texture });
          sphereMesh = new THREE.Mesh(sphereGeo, sphereMat);
          scene.add(sphereMesh);
        }
        document.getElementById('loading').style.display = 'none';
      }, (progress) => {
        if (progress.total > 0) {
          const pct = Math.round((progress.loaded / progress.total) * 100);
          document.getElementById('loading-text').textContent = `読み込み中... ${pct}%`;
        }
      }, () => {
        document.getElementById('loading-text').textContent = 'エラーが発生しました';
      });
    }

    // --- OrbitControls ---
    const controls = new OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true;
    controls.dampingFactor = 0.05;
    controls.enablePan = false;
    controls.enableZoom = true;
    controls.minDistance = 0.01;
    controls.maxDistance = 0.01;
    controls.minFov = 20;
    controls.rotateSpeed = -0.3; // Inverted for inside sphere
    controls.enableRotate = false; // Start in auto

    // Zoom via FOV
    renderer.domElement.addEventListener('wheel', (e) => {
      e.preventDefault();
      camera.fov = Math.max(30, Math.min(90, camera.fov + e.deltaY * 0.05));
      camera.updateProjectionMatrix();
    }, { passive: false });

    // --- Auto rotation ---
    let autoMode = true;
    let autoAngle = 0;
    const autoSpeed = 0.06;

    function toggleAuto() {
      autoMode = true;
      controls.enableRotate = false;
      document.getElementById('btn-auto').classList.add('active');
      document.getElementById('info').textContent = '自動鑑賞中 — スクロールでズーム / クリックで手動に切替';
    }

    function toggleManual() {
      autoMode = false;
      controls.enableRotate = true;
      controls.rotateSpeed = -0.3;
      document.getElementById('btn-auto').classList.remove('active');
      document.getElementById('info').textContent = 'ドラッグ: 回転 / スクロール: ズーム / ESCで自動鑑賞に戻る';
    }

    renderer.domElement.addEventListener('click', () => { if (autoMode) toggleManual(); });
    document.addEventListener('keydown', (e) => { if (e.code === 'Escape' && !autoMode) toggleAuto(); });
    window.toggleAuto = toggleAuto;
    window.toggleManual = toggleManual;
    window.switchRoom = (num) => loadRoom(num);

    // --- Animation ---
    const clock = new THREE.Clock();
    function animate() {
      requestAnimationFrame(animate);
      const delta = clock.getDelta();

      if (autoMode) {
        autoAngle += autoSpeed * delta;
        // Slowly rotate camera around the panorama
        const target = new THREE.Vector3(
          Math.cos(autoAngle) * 10,
          0,
          Math.sin(autoAngle) * 10
        );
        camera.lookAt(target);
      } else {
        controls.update();
      }

      renderer.render(scene, camera);
    }
    animate();

    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });

    // --- Initial load ---
    loadRoom(1);
  </script>
</body>
</html>
